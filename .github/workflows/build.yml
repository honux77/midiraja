name: Cross-Platform Build & Test

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-and-test:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup GraalVM (Java 25)
      uses: graalvm/setup-graalvm@v1
      with:
        java-version: '25'
        distribution: 'graalvm-community'
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Install ALSA dependencies (Linux only)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        # Install ALSA libs for compilation
        sudo apt-get install -y libasound2-dev
        # Attempt to load the virtual ALSA sequencer module (requires sudo)
        sudo modprobe snd-virmidi || sudo modprobe snd-dummy || echo "Kernel module load failed, relying on user-space ALSA."

    - name: Build JVM Classes
      run: ./gradlew classes

    - name: Run Unit Tests
      run: ./gradlew test

    - name: Compile Native Image
      run: ./gradlew nativeCompile

    - name: Upload Native Binary
      uses: actions/upload-artifact@v4
      with:
        name: midra-${{ matrix.os }}
        path: |
          build/native/nativeCompile/midra
          build/native/nativeCompile/midra.exe
