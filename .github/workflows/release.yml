name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to package (e.g. 0.2.0). Defaults to version in build.gradle.'
        required: false
        default: ''
      os_filter:
        description: 'OS to build (macos / linux-amd64 / linux-arm64 / windows). Leave empty for all.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-native:
    strategy:
      matrix:
        include:
          - os: macos-15
            artifact_name: midra
            asset_name: midra-darwin-arm64
            filter_key: macos
          - os: ubuntu-22.04
            artifact_name: midra
            asset_name: midra-linux-amd64
            filter_key: linux-amd64
          - os: ubuntu-24.04-arm
            artifact_name: midra
            asset_name: midra-linux-arm64
            filter_key: linux-arm64
          - os: windows-2022
            artifact_name: midra.exe
            asset_name: midra-windows-amd64
            filter_key: windows

    runs-on: ${{ matrix.os }}
    if: >
      github.event_name == 'push' ||
      github.event.inputs.os_filter == '' ||
      matrix.filter_key == github.event.inputs.os_filter

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        if: runner.os != 'Windows'
        run: chmod +x ./gradlew

      - name: Install ALSA dependencies (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Setup MSYS2 (Windows only)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc mingw-w64-x86_64-cmake make zip

      - name: Build C/C++ Native Libraries
        if: runner.os != 'Windows'
        run: ./scripts/build-native-libs.sh

      - name: Build C/C++ Native Libraries (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: ./scripts/build-native-libs.sh

      - name: Run Tests
        run: ./gradlew test

      - name: Build Native Image
        run: ./gradlew nativeCompile

      - name: Download FreePats
        run: ./gradlew setupFreepats

      - name: Package Artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${GITHUB_REF_NAME}" == v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION=$(./gradlew properties -q | awk '/^version:/ {print $2}')
          fi
          NATIVE_ARCH=$(uname -m)
          [ "$NATIVE_ARCH" = "arm64" ] && NATIVE_ARCH="aarch64"
          OS_FAMILY="macos" ; [ "$(uname -s)" = "Linux" ] && OS_FAMILY="linux"
          NATIVE_LIBS_DIR="build/native-libs/${OS_FAMILY}-${NATIVE_ARCH}"
          LIB_EXT="dylib"  ; [ "$OS_FAMILY" = "linux" ] && LIB_EXT="so"

          mkdir -p staging/bin staging/lib staging/share/midra/freepats
          cp build/native/nativeCompile/${{ matrix.artifact_name }} staging/bin/midra
          echo "${VERSION}" > staging/VERSION
          cp src/main/man/midra.1 staging/midra.1

          for lib in \
            "${NATIVE_LIBS_DIR}/miniaudio/libmidiraja_audio.${LIB_EXT}" \
            "${NATIVE_LIBS_DIR}/adlmidi/libADLMIDI.${LIB_EXT}" \
            "${NATIVE_LIBS_DIR}/opnmidi/libOPNMIDI.${LIB_EXT}" \
            "${NATIVE_LIBS_DIR}/munt/libmt32emu.${LIB_EXT}" \
            "${NATIVE_LIBS_DIR}/tsf/libtsf.${LIB_EXT}"; do
            [ -f "$lib" ] && cp "$lib" staging/lib/
          done

          cp -r build/freepats/. staging/share/midra/freepats/
          tar -czf ${{ matrix.asset_name }}.tar.gz -C staging .

      - name: Package Artifact (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${GITHUB_REF_NAME}" == v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION=$(./gradlew properties -q | awk '/^version:/ {print $2}')
          fi
          NATIVE_ARCH=$(uname -m)
          NATIVE_LIBS_DIR="build/native-libs/windows-${NATIVE_ARCH}"

          mkdir -p staging/bin staging/share/midra/freepats
          cp build/native/nativeCompile/${{ matrix.artifact_name }} staging/bin/midra.exe
          echo "${VERSION}" > staging/VERSION

          # On Windows, DLLs go in bin/ alongside the executable
          for lib in \
            "${NATIVE_LIBS_DIR}/miniaudio/libmidiraja_audio.dll" \
            "${NATIVE_LIBS_DIR}/adlmidi/libADLMIDI.dll" \
            "${NATIVE_LIBS_DIR}/opnmidi/libOPNMIDI.dll" \
            "${NATIVE_LIBS_DIR}/munt/libmt32emu.dll" \
            "${NATIVE_LIBS_DIR}/tsf/libtsf.dll"; do
            [ -f "$lib" ] && cp "$lib" staging/bin/
          done

          cp -r build/freepats/. staging/share/midra/freepats/
          (cd staging && zip -r ../${{ matrix.asset_name }}.zip .)

      - name: Upload as CI Artifact (manual run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}.*

      - name: Extract Changelog for this version
        if: github.event_name == 'push'
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BODY=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Upload Native Release Asset (tag push)
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          files: ${{ matrix.asset_name }}.*

  # midrax JAR is built and uploaded locally via scripts/upload-midrax.sh
