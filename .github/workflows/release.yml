name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: midra
            asset_name: midra-linux-amd64
          - os: macos-latest
            artifact_name: midra
            asset_name: midra-darwin-arm64
          - os: windows-latest
            artifact_name: midra.exe
            asset_name: midra-windows-amd64.exe

    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        
      - name: Make gradlew executable
        if: runner.os != 'Windows'
        run: chmod +x ./gradlew
        
      - name: Build Native Image
        run: ./gradlew nativeCompile

      - name: Build Leyden JVM Distribution (Unix only)
        if: runner.os != 'Windows'
        run: bash ./scripts/build-leyden-dist.sh

      - name: Rename Artifact
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            mv build/native/nativeCompile/${{ matrix.artifact_name }} ${{ matrix.asset_name }}
          else
            mv build/native/nativeCompile/${{ matrix.artifact_name }} ${{ matrix.asset_name }}
          fi
        shell: bash

      - name: Setup Ruby for fpm (Linux only)
        if: runner.os == 'Linux'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          
      - name: Install fpm and rpm tools (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm
          gem install fpm

      - name: Generate completions and build packages (Linux only)
        if: runner.os == 'Linux'
        run: |
          # Create staging directories
          mkdir -p pkg-root/usr/bin
          mkdir -p pkg-root/usr/share/zsh/vendor-completions
          mkdir -p pkg-root/usr/share/bash-completion/completions

          # Copy binary to staging (making sure it's executable)
          cp ${{ matrix.asset_name }} pkg-root/usr/bin/midra
          chmod +x pkg-root/usr/bin/midra

          # Generate completion scripts directly using the compiled binary
          ./pkg-root/usr/bin/midra generate-completion > pkg-root/usr/share/zsh/vendor-completions/_midra
          ./pkg-root/usr/bin/midra generate-completion > pkg-root/usr/share/bash-completion/completions/midra

          # Extract version from tag (remove 'v' prefix)
          VERSION=${GITHUB_REF_NAME#v}
          if [ -z "$VERSION" ]; then VERSION="0.1.0"; fi

          # Build .deb package
          fpm -s dir -t deb \
            -n midra -v "$VERSION" \
            --description "A blazing fast, cross-platform CLI MIDI player" \
            --maintainer "Park, Sungchul <fupfin@space-vision.ai>" \
            --url "https://github.com/sungchulpark/midiraja" \
            -C pkg-root .

          # Build .rpm package
          fpm -s dir -t rpm \
            -n midra -v "$VERSION" \
            --description "A blazing fast, cross-platform CLI MIDI player" \
            --maintainer "Park, Sungchul <fupfin@space-vision.ai>" \
            --url "https://github.com/sungchulpark/midiraja" \
            -C pkg-root .

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.asset_name }}
            *.deb
            *.rpm
            dist/midra-jvm-*.tar.gz
