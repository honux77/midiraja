name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-native:
    strategy:
      matrix:
        include:
          - os: macos-15
            artifact_name: midra
            asset_name: midra-darwin-arm64
          # Linux and Windows will be added in future steps
          # - os: ubuntu-22.04
          #   artifact_name: midra
          #   asset_name: midra-linux-amd64
          # - os: ubuntu-24.04-arm
          #   artifact_name: midra
          #   asset_name: midra-linux-arm64
          # - os: windows-2022
          #   artifact_name: midra.exe
          #   asset_name: midra-windows-amd64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build C/C++ Native Libraries
        run: ./scripts/build-native-libs.sh

      - name: Build Native Image
        run: ./gradlew nativeCompile

      - name: Package Artifact
        run: |
          chmod +x build/native/nativeCompile/${{ matrix.artifact_name }}
          mkdir -p staging
          cp build/native/nativeCompile/${{ matrix.artifact_name }} staging/midra
          cp man/midra.1 staging/
          tar -czf ${{ matrix.asset_name }}.tar.gz -C staging .

      - name: Upload Native Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}.tar.gz

  # midrax JAR is built and uploaded locally via scripts/upload-midrax.sh
