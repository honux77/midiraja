plugins {
    id 'com.diffplug.spotless' version '7.0.2'
    id 'application'
    id 'org.graalvm.buildtools.native' version '0.10.1'
    id 'jacoco'
    id 'net.ltgt.errorprone' version '4.1.0'
    id 'pmd'
}
apply plugin: 'checkstyle'


version = '0.3.4'

def generatedVersionDir = layout.buildDirectory.dir("generated/sources/version/java")

def fallbackLibDirs = [
    darwin : ['/opt/homebrew/lib', '/usr/local/lib', '/opt/local/lib'],
    linux  : ['/usr/local/lib', '/opt/local/lib'],
    windows: []
]

task generateLibraryPathsClass {
    def outputDir = generatedVersionDir.get().asFile
    def dirs = fallbackLibDirs
    outputs.dir(outputDir)
    doLast {
        def pkgDir = new File(outputDir, "com/midiraja")
        pkgDir.mkdirs()
        def fmt = { list -> list.collect { "\"${it}\"" }.join(', ') }
        new File(pkgDir, "LibraryPaths.java").text = """package com.fupfin.midiraja;

public final class LibraryPaths {
    public static final String[] DARWIN  = {${fmt(dirs.darwin)}};
    public static final String[] LINUX   = {${fmt(dirs.linux)}};
    public static final String[] WINDOWS = {${fmt(dirs.windows)}};
    private LibraryPaths() {}
}
"""
    }
}

task generateVersionClass {
    def outputDir = generatedVersionDir.get().asFile
    def projVersion = project.version.toString()
    def gitHash = { ->
        try { 'git rev-parse --short HEAD'.execute().text.trim() }
        catch (Exception e) { 'unknown' }
    }()
    outputs.dir(outputDir)
    doLast {
        def pkgDir = new File(outputDir, "com/midiraja")
        pkgDir.mkdirs()
        new File(pkgDir, "Version.java").text = """package com.fupfin.midiraja;

public final class Version {
    public static final String VERSION = "${projVersion}";
    public static final String COMMIT  = "${gitHash}";
    private Version() {}
}
"""
    }
}

sourceSets.main.java.srcDir(generatedVersionDir)
compileJava.dependsOn(generateVersionClass, generateLibraryPathsClass)

repositories {
    mavenCentral()
}

def freepatsDir = layout.buildDirectory.dir("freepats")

task downloadFreepats(type: Exec) {
    def destFile = file("${buildDir}/freepats.zip")
    def url = "https://github.com/feross/freepats/archive/refs/heads/master.zip"
    inputs.property("url", url)
    outputs.file(destFile)
    
    commandLine 'curl', '-L', url, '-o', destFile.absolutePath
    
    onlyIf { !destFile.exists() }
}

task setupFreepats(type: Copy) {
    dependsOn downloadFreepats
    from zipTree(file("${buildDir}/freepats.zip"))
    into freepatsDir
    
    // GitHub zip has a top-level folder 'freepats-master'
    // We strip it by mapping everything inside it to the root of freepatsDir
    eachFile { fcd ->
        fcd.relativePath = new RelativePath(true, fcd.relativePath.segments.drop(1))
    }
    includeEmptyDirs = false

    doLast {
        def cfg = file("${freepatsDir.get().asFile}/freepats.cfg")
        if (cfg.exists()) {
            // Ensure timidity.cfg exists for our engine
            def target = new File(cfg.parentFile, "timidity.cfg")
            target.text = cfg.text
        }
    }
}

// Ensure freepats are ready before packaging (used by package-release.sh, not embedded in binary)
installDist.dependsOn(setupFreepats)

task downloadFluidR3Sf3(type: Exec) {
    description = 'Downloads the FluidR3 GM SF3 SoundFont (MIT license) for bundling.'
    def destFile = file("${buildDir}/soundfonts/FluidR3_GM.sf3")
    def url = "https://raw.githubusercontent.com/Jacalz/fluid-soundfont/master/SF3/FluidR3.sf3"
    inputs.property("url", url)
    outputs.file(destFile)
    doFirst { destFile.parentFile.mkdirs() }
    commandLine 'curl', '-L', url, '-o', destFile.absolutePath
    onlyIf { !destFile.exists() }
}

