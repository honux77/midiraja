plugins {
    id 'application'
    id 'org.graalvm.buildtools.native' version '0.10.1'
    id 'jacoco'
    id 'net.ltgt.errorprone' version '4.1.0'
}

version = '0.1'

def generatedVersionDir = layout.buildDirectory.dir("generated/sources/version/java")

task generateVersionClass {
    def outputDir = generatedVersionDir.get().asFile
    outputs.dir(outputDir)
    doLast {
        def pkgDir = new File(outputDir, "com/midiraja")
        pkgDir.mkdirs()
        new File(pkgDir, "Version.java").text = """package com.midiraja;

public final class Version {
    public static final String VERSION = "${project.version}";
    private Version() {}
}
"""
    }
}

sourceSets.main.java.srcDir(generatedVersionDir)
compileJava.dependsOn(generateVersionClass)

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.jspecify:jspecify:1.0.0'
    implementation 'info.picocli:picocli:4.7.5'
    annotationProcessor 'info.picocli:picocli-codegen:4.7.5'
        implementation 'org.jline:jline:3.24.1'
    
    errorprone 'com.google.errorprone:error_prone_core:2.36.0'
    annotationProcessor 'com.uber.nullaway:nullaway:0.12.3'
    
    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.10.0'
    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine:5.10.0'
    testImplementation 'org.mockito:mockito-core:5.5.0'
    testImplementation 'org.mockito:mockito-junit-jupiter:5.5.0'
}

jacoco {
    // Note: JaCoCo 0.8.11 currently does not fully support Java 25 (Class version 69).
    // Tests will run fine, but jacocoTestReport may fail until a newer version is released.
    toolVersion = "0.8.11"
}

jacocoTestReport {
    dependsOn test
    reports {
        xml.required = true
        csv.required = true
        html.required = true
    }
}

import net.ltgt.gradle.errorprone.CheckSeverity

tasks.withType(JavaCompile).configureEach {
    options.compilerArgs.add('--enable-preview')
    options.errorprone {
        check("NullAway", CheckSeverity.ERROR)
        option("NullAway:AnnotatedPackages", "com.midiraja")
        option("NullAway:JSpecifyMode", "true")
    }
}

test {
    useJUnitPlatform()
    jvmArgs('--enable-native-access=ALL-UNNAMED', '--enable-preview')
    // Coverage report generation is enabled but might fail on Java 25.
    finalizedBy jacocoTestReport
}

application {
    mainClass = 'com.midiraja.MidirajaCommand'
    applicationDefaultJvmArgs = ['--enable-native-access=ALL-UNNAMED', '--enable-preview']
}

run {
    standardInput = System.in
    if (project.hasProperty('jvmArgs')) {
        jvmArgs = project.getProperty('jvmArgs').split(',')
    }
}

graalvmNative {
    binaries {
        main {
            imageName = 'midra'
            buildArgs.add('--no-fallback')
            buildArgs.add('--enable-native-access=ALL-UNNAMED')
            buildArgs.add('--enable-preview')
            buildArgs.add('-H:+UnlockExperimentalVMOptions')
            // Required for dynamic loading of JNA
            buildArgs.add('-H:+SharedArenaSupport')
            // Optimize binary size
            buildArgs.add('-Os') 
            buildArgs.add('--install-exit-handlers')
        }
    }
}

